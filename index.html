<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pasaporte de Inglés</title>
<style>
  :root{
    --paper:#FAF6EC;
    --paper-dark:#F0E8D4;
    --ink:#202A3C;
    --ink-soft:#5B6478;
    --stamp-red:#BD432B;
    --stamp-gold:#A67425;
    --stamp-green:#2F6B4F;
    --line:#D9CDB0;
    --error:#B23A2F;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5;
  }
  h1,h2,h3,.serif{ font-family:Georgia,"Iowan Old Style","Palatino Linotype",serif; }
  #app{ max-width:880px; margin:0 auto; padding:28px 18px 60px; }

  .topbar{ text-align:center; margin-bottom:22px; }
  .topbar .eyebrow{ letter-spacing:.18em; text-transform:uppercase; font-size:11px; color:var(--ink-soft); }
  .topbar h1{ font-size:30px; margin:4px 0 2px; }
  .topbar p{ color:var(--ink-soft); margin:0; font-size:14px; }

  .progress-wrap{ margin:18px 0 26px; }
  .progress-bar{ background:var(--paper-dark); border:1px solid var(--line); border-radius:20px; height:14px; overflow:hidden; }
  .progress-fill{ background:linear-gradient(90deg,var(--stamp-gold),var(--stamp-red)); height:100%; transition:width .4s ease; }
  .progress-label{ display:flex; justify-content:space-between; font-size:12px; color:var(--ink-soft); margin-top:6px; }

  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:16px; }
  .card{
    background:#fff; border:1px solid var(--line); border-radius:var(--radius);
    padding:18px 14px; position:relative; cursor:pointer; transition:transform .15s, box-shadow .15s;
    box-shadow:0 1px 2px rgba(0,0,0,.04);
  }
  .card:hover{ transform:translateY(-2px); box-shadow:0 6px 16px rgba(0,0,0,.08); }
  .card.locked{ cursor:not-allowed; opacity:.55; filter:grayscale(.4); }
  .card:hover.locked{ transform:none; box-shadow:0 1px 2px rgba(0,0,0,.04); }
  .stamp{
    width:54px; height:54px; border-radius:50%; border:2px dashed var(--stamp-red);
    display:flex; align-items:center; justify-content:center; font-size:24px;
    transform:rotate(-8deg); margin-bottom:10px; color:var(--stamp-red);
  }
  .card.done .stamp{ border-style:solid; border-color:var(--stamp-green); color:var(--stamp-green); background:#f2f8f5; }
  .card .unit-no{ font-size:11px; letter-spacing:.12em; color:var(--ink-soft); text-transform:uppercase; }
  .card h3{ margin:4px 0 6px; font-size:17px; }
  .card .status{ font-size:12px; color:var(--ink-soft); }
  .card .status.done{ color:var(--stamp-green); font-weight:600; }
  .lock-icon{ position:absolute; top:14px; right:14px; font-size:16px; }

  .btn{
    font-family:inherit; border:1px solid var(--ink); background:var(--ink); color:#fff;
    padding:10px 18px; border-radius:30px; cursor:pointer; font-size:14px; font-weight:600;
  }
  .btn:hover{ opacity:.88; }
  .btn.secondary{ background:transparent; color:var(--ink); }
  .btn.ghost{ background:transparent; border:1px solid var(--line); color:var(--ink-soft); }
  .btn:disabled{ opacity:.4; cursor:not-allowed; }
  .btn-row{ display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; }

  .unit-header{ display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; flex-wrap:wrap; gap:10px; }
  .unit-header h2{ margin:0; font-size:24px; }
  .back-link{ color:var(--ink-soft); cursor:pointer; font-size:13px; text-decoration:underline; }

  .tabs{ display:flex; gap:6px; border-bottom:1px solid var(--line); margin-bottom:20px; flex-wrap:wrap; }
  .tab{ padding:10px 14px; font-size:13px; cursor:pointer; color:var(--ink-soft); border-bottom:3px solid transparent; font-weight:600; }
  .tab.active{ color:var(--ink); border-bottom-color:var(--stamp-red); }

  .panel{ background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:22px; }

  .rule{ margin-bottom:18px; padding-bottom:16px; border-bottom:1px solid var(--paper-dark); }
  .rule:last-child{ border-bottom:none; margin-bottom:0; padding-bottom:0; }
  .rule h4{ margin:0 0 8px; font-size:15px; }
  .example{ background:var(--paper-dark); border-radius:8px; padding:8px 12px; margin-top:6px; font-size:14px; }
  .example .en{ font-weight:600; }
  .example .es{ color:var(--ink-soft); font-size:13px; }

  .vocab-row{ display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--paper-dark); }
  .vocab-row:last-child{ border-bottom:none; }
  .vocab-en{ font-weight:600; }
  .vocab-es{ color:var(--ink-soft); font-size:13px; }
  .speak-btn{ border:1px solid var(--line); background:var(--paper-dark); border-radius:50%; width:34px; height:34px; cursor:pointer; font-size:15px; }
  .speak-btn:hover{ background:var(--line); }

  .bubble{ max-width:75%; padding:10px 14px; border-radius:14px; margin-bottom:10px; font-size:14px; }
  .bubble.A{ background:var(--paper-dark); margin-right:auto; border-bottom-left-radius:2px; }
  .bubble.B{ background:#FDEFE9; margin-left:auto; border-bottom-right-radius:2px; text-align:right; }
  .bubble .es{ color:var(--ink-soft); font-size:12px; margin-top:3px; }

  .practice-card{ border:1px solid var(--line); border-radius:10px; padding:16px; margin-bottom:14px; }
  .practice-phrase{ font-size:16px; font-weight:600; }
  .practice-es{ color:var(--ink-soft); font-size:13px; margin-bottom:10px; }
  .mic-row{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .result-box{ margin-top:8px; font-size:13px; padding:8px 10px; border-radius:8px; display:none; }
  .result-box.ok{ background:#EAF5EF; color:var(--stamp-green); display:block; }
  .result-box.bad{ background:#FBEAE7; color:var(--error); display:block; }
  .diffword{ font-weight:600; }
  .diffword.ok{ color:var(--stamp-green); }
  .diffword.bad{ color:var(--error); text-decoration:underline wavy; }

  .review-card{ text-align:center; padding:50px 20px; }
  .review-word{ font-size:30px; font-weight:700; margin-bottom:8px; }
  .review-translation{ font-size:18px; color:var(--ink-soft); min-height:26px; margin-bottom:18px; }
  .review-progress{ font-size:12px; color:var(--ink-soft); margin-bottom:16px; }
  .review-done{ text-align:center; padding:40px 20px; }

  .q-block{ margin-bottom:20px; }
  .q-text{ font-weight:600; margin-bottom:8px; }
  .opt{ display:block; padding:9px 12px; border:1px solid var(--line); border-radius:8px; margin-bottom:6px; cursor:pointer; font-size:14px; }
  .opt:hover{ background:var(--paper-dark); }
  .opt.selected{ border-color:var(--ink); background:var(--paper-dark); }
  .opt.correct{ border-color:var(--stamp-green); background:#EAF5EF; }
  .opt.incorrect{ border-color:var(--error); background:#FBEAE7; }
  .opt input{ margin-right:8px; }

  .score-banner{ text-align:center; padding:16px; border-radius:10px; margin-bottom:18px; font-weight:600; }
  .score-banner.pass{ background:#EAF5EF; color:var(--stamp-green); }
  .score-banner.fail{ background:#FBEAE7; color:var(--error); }

  .footnote{ text-align:center; font-size:12px; color:var(--ink-soft); margin-top:30px; }
  .footnote span{ text-decoration:underline; cursor:pointer; }
</style>
</head>
<body>

    {en:"The best",es:"El/la mejor"},{en:"Worse",es:"Peor"},{en:"The worst",es:"El/la peor"},

/* ============== ESTADO Y PERSISTENCIA ============== */
let progress = {};   // {1:{completed:true,score:80}, ...}
let lastUnit = null;
let state = { view:"dashboard", unitId:null, tab:"grammar" };
let recognition = null;

function loadProgress(){
  try{
    const raw = localStorage.getItem("pasaporte_progress");
    progress = raw ? JSON.parse(raw) : {};
  }catch(e){ progress = {}; }
  render();
}
function saveProgress(){
  try{ localStorage.setItem("pasaporte_progress", JSON.stringify(progress)); }catch(e){}
}
function resetProgress(){
  if(!confirm("¿Borrar todo el progreso guardado? Esta acción no se puede deshacer.")) return;
  progress = {};
  try{ localStorage.removeItem("pasaporte_progress"); }catch(e){}
  state.view = "dashboard";
  render();
}

function exportProgress(){
  const blob = new Blob([JSON.stringify(progress,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "progreso-ingles-ian.json";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function importProgress(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try{
      const data = JSON.parse(e.target.result);
      progress = data;
      saveProgress();
      alert("Progreso restaurado correctamente.");
      render();
    }catch(err){ alert("El archivo no es válido."); }
  };
  reader.readAsText(file);
  input.value = "";
}

function isUnlocked(unitId){
  if(unitId===1) return true;
  return !!(progress[unitId-1] && progress[unitId-1].completed);
}
function unitProgress(unitId){ return progress[unitId] || {completed:false,score:0}; }

/* ============== REPASO DIARIO DE VOCABULARIO ============== */
const LEITNER_DAYS = {1:0, 2:1, 3:3, 4:7, 5:14};
function allVocab(){
  const seen = new Set(); const list = [];
  UNITS.forEach(u => u.vocab.forEach(v => { if(!seen.has(v.en)){ seen.add(v.en); list.push(v); } }));
  return list;
}
function todayStr(){ return new Date().toISOString().slice(0,10); }
function loadReview(){
  try{ return JSON.parse(localStorage.getItem("vocab_review")||"{}"); }catch(e){ return {}; }
}
function saveReview(rs){ try{ localStorage.setItem("vocab_review", JSON.stringify(rs)); }catch(e){} }
function getDueWords(){
  const rs = loadReview(); const today = todayStr(); const due = [];
  allVocab().forEach(v => {
    if(!rs[v.en]) rs[v.en] = { box:1, due: today };
    if(rs[v.en].due <= today) due.push(v);
  });
  saveReview(rs);
  return due;
}
let reviewQueue = [], reviewIndex = 0, reviewRevealed = false, reviewCorrectCount = 0;
function startReview(){
  reviewQueue = getDueWords().sort(()=>Math.random()-0.5).slice(0,20);
  reviewIndex = 0; reviewRevealed = false; reviewCorrectCount = 0;
  state.view = "review";
  render();
}
function revealReview(){ reviewRevealed = true; render(); }
function answerReview(known){
  const word = reviewQueue[reviewIndex];
  const rs = loadReview();
  const entry = rs[word.en] || {box:1, due:todayStr()};
  if(known){
    entry.box = Math.min(entry.box+1, 5);
    reviewCorrectCount++;
  } else {
    entry.box = 1;
  }
  const days = LEITNER_DAYS[entry.box] || 0;
  const d = new Date(); d.setDate(d.getDate()+days);
  entry.due = d.toISOString().slice(0,10);
  rs[word.en] = entry; saveReview(rs);
  reviewIndex++; reviewRevealed = false;
  render();
}

/* ============== VOZ ============== */
function speak(text){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US"; u.rate = 0.92;
  window.speechSynthesis.speak(u);
}
function speakSequence(lines, i=0){
  if(!('speechSynthesis' in window) || i>=lines.length) return;
  const u = new SpeechSynthesisUtterance(lines[i]);
  u.lang = "en-US"; u.rate = 0.92;
  u.onend = () => speakSequence(lines, i+1);
  window.speechSynthesis.speak(u);
}

function micSupported(){
  return ('SpeechRecognition' in window) || ('webkitSpeechRecognition' in window);
}
function wordDiff(target, heard){
  const clean = s => s.toLowerCase().replace(/[^a-z0-9' ]/g,"").trim();
  const t = clean(target).split(/\s+/);
  const h = clean(heard).split(/\s+/);
  return t.map((w,i) => ({ word: t[i], ok: h[i] === w }));
}
function startRecording(phraseIdx, targetText){
  if(!micSupported()){
    showResult(phraseIdx, "⚠️ Tu navegador no soporta el micrófono para reconocimiento de voz. Prueba con Google Chrome.", false);
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const rec = new SR();
  rec.lang = "en-US"; rec.maxAlternatives = 1;
  const btn = document.getElementById("mic-"+phraseIdx);
  if(btn){ btn.textContent = "🎙️ Escuchando…"; btn.disabled = true; }
  rec.onresult = (event) => {
    const heard = event.results[0][0].transcript;
    const diff = wordDiff(targetText, heard);
    const allOk = diff.every(d => d.ok);
    const wordsHtml = diff.map(d => `<span class="diffword ${d.ok?'ok':'bad'}">${d.word}</span>`).join(" ");
    const html = `<div>${allOk ? "✅ ¡Pronunciación correcta!" : "⚠️ Revisa estas palabras (en rojo):"}</div>
      <div style="margin-top:4px;">${wordsHtml}</div>
      <div style="margin-top:4px;color:var(--ink-soft);font-size:12px;">Escuchamos: "${heard}"</div>`;
    showResult(phraseIdx, html, allOk);
  };
  rec.onerror = (e) => { showResult(phraseIdx, "No se pudo escuchar bien. Acércate al micrófono e intenta de nuevo.", false); };
  rec.onend = () => { if(btn){ btn.textContent = "🎤 Grabar"; btn.disabled = false; } };
  rec.start();
}
function showResult(idx, html, ok){
  const box = document.getElementById("result-"+idx);
  if(!box) return;
  box.className = "result-box " + (ok ? "ok" : "bad");
  box.innerHTML = html;
}

  else app.innerHTML = renderUnitView();
}

const PRONUNCIATION_TIPS = [

   words:["think","this","three","mother","thank you"]},
  {title:"La \"H\" se pronuncia (a diferencia del español)", tip:"En español la H es muda. En inglés se pronuncia como un soplido de aire suave, parecido a una \"j\" muy débil.",
   words:["hello","house","happy","help","how"]},
  {title:"\"V\" vs \"B\"", tip:"En español suenan casi igual, pero en inglés son distintos: para la \"V\", el labio inferior toca los dientes de arriba (no se juntan los labios como en la B).",
   words:["very","berry","vacation","beautiful","video"]},
  {title:"Vocal corta \"I\" vs vocal larga \"EE\"", tip:"\"ship\" (barco) y \"sheep\" (oveja) suenan diferente: la \"I\" corta es más relajada y breve; la \"EE\" se alarga más.",
   words:["ship","sheep","sit","seat","big"]},
  {title:"Terminación \"-ed\" en el pasado", tip:"Se pronuncia distinto según la última letra del verbo: /t/ (worked), /d/ (played), o /id/ (wanted, needed).",
   words:["worked","played","wanted","needed","watched"]},
  {title:"No \"agregues\" vocales al final", tip:"En español tendemos a suavizar el final de las palabras. En inglés, las consonantes finales deben sonar claras y cortadas, sin vocal extra después.",
   words:["work","cat","stop","good","cold"]},
  {title:"Acento de la palabra (stress)", tip:"En inglés, la sílaba acentuada cambia mucho el sonido. Practica escuchando dónde cae el golpe de voz.",
   words:["photograph","photography","important","comfortable","interesting"]}
];

function renderDashboard(){
  const total = UNITS.length;
  const done = UNITS.filter(u => unitProgress(u.id).completed).length;
  const pct = Math.round((done/total)*100);
  const cards = UNITS.map(u => {
    const p = unitProgress(u.id);
    const unlocked = isUnlocked(u.id);
    const cls = "card" + (p.completed ? " done" : "") + (!unlocked ? " locked" : "");
    return `<div class="${cls}" onclick="${unlocked ? `openUnit(${u.id})` : ''}">
      ${!unlocked ? '<span class="lock-icon">🔒</span>' : ''}
      <div class="stamp">${u.icon}</div>
      <div class="unit-no">Unidad ${u.id}</div>
      <h3>${u.title}</h3>
      <div class="status ${p.completed ? 'done':''}">${p.completed ? '✓ Completada · '+p.score+'%' : (unlocked ? 'Disponible' : 'Bloqueada')}</div>
    </div>`;
  }).join("");

  return `
    <div class="topbar">
      <div class="eyebrow">Curso de Inglés · Comunicación del día a día</div>
      <h1>🛂 Pasaporte de Inglés</h1>
      <p>Aprende gramática, vocabulario y pronunciación paso a paso</p>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-label"><span>${done} de ${total} unidades completadas</span><span>${pct}%</span></div>
    </div>
    <div class="btn-row" style="justify-content:center;margin-bottom:24px;">
      <button class="btn" onclick="startReview()">📚 Repaso diario de vocabulario (${getDueWords().length} palabras hoy)</button>
      <button class="btn ghost" onclick="showPronunciationTips()">🗣️ Consejos de pronunciación</button>
    </div>
    <div class="grid">${cards}</div>
    <div class="btn-row" style="justify-content:center;margin-top:24px;">
      <button class="btn ghost" onclick="exportProgress()">💾 Descargar respaldo de progreso</button>
      <label class="btn ghost" style="cursor:pointer;">📤 Restaurar respaldo
        <input type="file" accept="application/json" onchange="importProgress(this)" style="display:none;">
      </label>
    </div>
    <div class="footnote">¿Quieres empezar de nuevo? <span onclick="resetProgress()">Reiniciar progreso</span></div>
  `;
}

function renderReview(){
  if(reviewQueue.length === 0){
    return `<div class="review-done">
      <h2>📚 Repaso diario</h2>
      <p>No tienes palabras pendientes de repaso hoy. ¡Vuelve mañana! 🎉</p>
      <button class="btn" onclick="backToDashboard()">Volver al pasaporte</button>
    </div>`;
  }
  if(reviewIndex >= reviewQueue.length){
    return `<div class="review-done">
      <h2>🎉 ¡Repaso completado!</h2>
      <p>Acertaste ${reviewCorrectCount} de ${reviewQueue.length} palabras.</p>
      <button class="btn" onclick="backToDashboard()">Volver al pasaporte</button>
    </div>`;
  }
  const word = reviewQueue[reviewIndex];
  return `<div class="panel review-card">
    <div class="review-progress">Palabra ${reviewIndex+1} de ${reviewQueue.length}</div>
    <div class="review-word">${word.en}</div>
    <button class="speak-btn" style="margin-bottom:14px;" onclick="speak('${word.en.replace(/'/g,"\\'")}')">🔊</button>
    <div class="review-translation">${reviewRevealed ? word.es : "¿Qué significa esta palabra?"}</div>
    ${!reviewRevealed
      ? `<button class="btn" onclick="revealReview()">Mostrar traducción</button>`
      : `<div class="btn-row" style="justify-content:center;">
          <button class="btn" onclick="answerReview(true)">✅ Lo sabía</button>
          <button class="btn secondary" onclick="answerReview(false)">🔁 Necesito repasar</button>
        </div>`}
  </div>
  <div class="btn-row" style="justify-content:center;"><button class="btn ghost" onclick="backToDashboard()">Salir del repaso</button></div>`;
}

function openUnit(id){
  state.view = "unit"; state.unitId = id; state.tab = "grammar";
  render();
}
function backToDashboard(){ state.view = "dashboard"; render(); }
function setTab(tab){ state.tab = tab; render(); }

function renderUnitView(){
  const u = UNITS.find(x => x.id === state.unitId);
  const tabs = [
    ["grammar","Gramática"], ["vocab","Vocabulario"], ["dialogue","Diálogo"],
    ["listening","Comprensión 🎧"], ["practice","Práctica oral"], ["quiz","Examen"]
  ];
  const tabsHtml = tabs.map(([k,label]) =>
    `<div class="tab ${state.tab===k?'active':''}" onclick="setTab('${k}')">${label}</div>`
  ).join("");

  let content = "";
  if(state.tab === "grammar") content = renderGrammar(u);
  else if(state.tab === "vocab") content = renderVocab(u);
  else if(state.tab === "dialogue") content = renderDialogue(u);
  else if(state.tab === "listening") content = renderListening(u);
  else if(state.tab === "practice") content = renderPractice(u);
  else if(state.tab === "quiz") content = renderQuiz(u);

  return `
    <div class="unit-header">
      <div><span class="back-link" onclick="backToDashboard()">← Volver al pasaporte</span>
      <h2>${u.icon} Unidad ${u.id}: ${u.title}</h2></div>
    </div>
    <div class="tabs">${tabsHtml}</div>
    <div class="panel">${content}</div>
  `;
}

function renderGrammar(u){
  const rules = u.grammar.rules.map(r => `
    <div class="rule">
      <h4>${r.rule}</h4>
      ${r.examples.map(ex => `<div class="example"><div class="en">${ex.en}</div><div class="es">${ex.es}</div></div>`).join("")}
    </div>
  `).join("");
  return `<h3>${u.grammar.title}</h3>${rules}
    <div class="btn-row"><button class="btn" onclick="setTab('vocab')">Siguiente: Vocabulario →</button></div>`;
}

function renderVocab(u){
  const rows = u.vocab.map(v => `
    <div class="vocab-row">
      <div><div class="vocab-en">${v.en}</div><div class="vocab-es">${v.es}</div></div>
      <button class="speak-btn" onclick="speak('${v.en.replace(/'/g,"\\'")}')">🔊</button>
    </div>
  `).join("");
  return `<h3>Vocabulario</h3><p style="color:var(--ink-soft);font-size:13px;">Toca 🔊 para escuchar la pronunciación.</p>${rows}
    <div class="btn-row"><button class="btn" onclick="setTab('dialogue')">Siguiente: Diálogo →</button></div>`;
}

function renderDialogue(u){
  const lines = u.dialogue.map(d => `<div class="bubble ${d.sp}">${d.en}<div class="es">${d.es}</div></div>`).join("");
  return `<h3>Diálogo</h3>${lines}
    <div class="btn-row">
      <button class="btn secondary" onclick='speakSequence(${JSON.stringify(u.dialogue.map(d=>d.en))})'>▶ Reproducir diálogo</button>
      <button class="btn" onclick="setTab('listening')">Siguiente: Comprensión 🎧 →</button>
    </div>`;
}

let listeningState = {};
function renderListening(u){
  if(!listeningState[u.id]) listeningState[u.id] = { revealedText:false, answers:{}, submitted:false };
  const ls = listeningState[u.id];
  const blocks = (u.listening||[]).map((q,qi) => {
    const opts = q.opts.map((opt,oi) => {
      let cls = "opt";
      if(ls.submitted){
        if(oi===q.correct) cls += " correct";
        else if(ls.answers[qi]===oi) cls += " incorrect";
      } else if(ls.answers[qi]===oi) cls += " selected";
      return `<label class="${cls}" onclick="${ls.submitted?'':`selectListeningAnswer(${u.id},${qi},${oi})`}">
        <input type="radio" name="lq${qi}" ${ls.answers[qi]===oi?'checked':''} ${ls.submitted?'disabled':''}/>${opt}
      </label>`;
    }).join("");
    const explain = ls.submitted ? `<p style="font-size:12px;color:var(--ink-soft);margin-top:4px;">${q.explain}</p>` : "";
    return `<div class="q-block"><div class="q-text">${qi+1}. ${q.q}</div>${opts}${explain}</div>`;
  }).join("");

  return `<h3>Comprensión auditiva 🎧</h3>
    <p style="color:var(--ink-soft);font-size:13px;">Escucha el audio (sin leer el texto) y responde. Puedes escucharlo varias veces antes de contestar.</p>
    <div class="btn-row">
      <button class="btn" onclick='speakSequence(${JSON.stringify(u.dialogue.map(d=>d.en))})'>🔊 Escuchar diálogo</button>
      <button class="btn ghost" onclick="toggleListeningText(${u.id})">${ls.revealedText ? "Ocultar texto" : "👀 Mostrar texto (si te trabas)"}</button>
    </div>
    ${ls.revealedText ? `<div style="margin-top:14px;">${u.dialogue.map(d=>`<div class="bubble ${d.sp}">${d.en}</div>`).join("")}</div>` : ""}
    <div style="margin-top:20px;">${blocks}</div>
    ${!ls.submitted
      ? `<div class="btn-row"><button class="btn" onclick="submitListening(${u.id})" ${Object.keys(ls.answers).length<(u.listening||[]).length?'disabled':''}>Comprobar respuestas</button></div>`
      : `<div class="btn-row"><button class="btn" onclick="setTab('practice')">Siguiente: Práctica oral →</button></div>`}
  `;
}
function selectListeningAnswer(unitId, qi, oi){ listeningState[unitId].answers[qi] = oi; render(); }
function submitListening(unitId){ listeningState[unitId].submitted = true; render(); }
function toggleListeningText(unitId){ listeningState[unitId].revealedText = !listeningState[unitId].revealedText; render(); }

function renderPractice(u){
  const warn = !micSupported() ? `<p style="color:var(--error);font-size:13px;">⚠️ Tu navegador no soporta grabación de voz. Puedes escuchar la pronunciación, pero la grabación funciona mejor en Google Chrome.</p>` : "";
  const cards = u.practice.map((p,i) => `
    <div class="practice-card">
      <div class="practice-phrase">${p.en}</div>
      <div class="practice-es">${p.es}</div>
      <div class="mic-row">
        <button class="btn ghost" onclick="speak('${p.en.replace(/'/g,"\\'")}')">🔊 Escuchar</button>
        <button class="btn" id="mic-${i}" onclick="startRecording(${i}, '${p.en.replace(/'/g,"\\'")}')">🎤 Grabar</button>
      </div>
      <div class="result-box" id="result-${i}"></div>
    </div>
  `).join("");
  return `<h3>Práctica oral</h3><p style="color:var(--ink-soft);font-size:13px;">Escucha la frase, luego grábate diciéndola en voz alta.</p>${warn}${cards}
    <div class="btn-row"><button class="btn" onclick="setTab('quiz')">Siguiente: Examen →</button></div>`;
}

let quizState = {};
function renderQuiz(u){
  if(!quizState[u.id]) quizState[u.id] = { answers:{}, submitted:false };
  const qs = quizState[u.id];
  const blocks = u.quiz.map((q,qi) => {
    const opts = q.opts.map((opt,oi) => {
      let cls = "opt";
      if(qs.submitted){
        if(oi===q.correct) cls += " correct";
        else if(qs.answers[qi]===oi) cls += " incorrect";
      } else if(qs.answers[qi]===oi) cls += " selected";
      return `<label class="${cls}" onclick="${qs.submitted?'':`selectAnswer(${u.id},${qi},${oi})`}">
        <input type="radio" name="q${qi}" ${qs.answers[qi]===oi?'checked':''} ${qs.submitted?'disabled':''}/>${opt}
      </label>`;
    }).join("");
    const explain = qs.submitted ? `<p style="font-size:12px;color:var(--ink-soft);margin-top:4px;">${q.explain}</p>` : "";
    return `<div class="q-block"><div class="q-text">${qi+1}. ${q.q}</div>${opts}${explain}</div>`;
  }).join("");

  let banner = "";
  let scoreActions = "";
  if(qs.submitted){
    const correct = u.quiz.filter((q,qi)=>qs.answers[qi]===q.correct).length;
    const score = Math.round((correct/u.quiz.length)*100);
    const passed = score >= 60;
    banner = `<div class="score-banner ${passed?'pass':'fail'}">${passed ? '🎉 ¡Aprobaste!' : '😕 No alcanzaste el mínimo'} — ${correct}/${u.quiz.length} correctas (${score}%)</div>`;
    scoreActions = `<div class="btn-row">
      ${passed ? `<button class="btn" onclick="completeUnit(${u.id},${score})">Guardar y continuar</button>` : `<button class="btn" onclick="retryQuiz(${u.id})">Reintentar examen</button>`}
      <button class="btn secondary" onclick="backToDashboard()">Volver al pasaporte</button>
    </div>`;
  }

  return `<h3>Examen</h3>${banner}${blocks}
    ${!qs.submitted ? `<div class="btn-row"><button class="btn" onclick="submitQuiz(${u.id})" ${Object.keys(qs.answers).length<u.quiz.length?'disabled':''}>Enviar respuestas</button></div>` : scoreActions}`;
}
function selectAnswer(unitId, qi, oi){
  quizState[unitId].answers[qi] = oi;
  render();
}
function submitQuiz(unitId){
  quizState[unitId].submitted = true;
  render();
}
function retryQuiz(unitId){
  quizState[unitId] = { answers:{}, submitted:false };
  render();
}
async function completeUnit(unitId, score){
  const prev = progress[unitId];
  progress[unitId] = { completed:true, score: Math.max(score, prev?prev.score:0) };
  await saveProgress();
  state.view = "dashboard";
  render();
}

/* ============== INICIO ============== */
loadProgress();
</script>
</body>
</html>
